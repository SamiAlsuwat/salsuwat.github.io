<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">تفاصيل المقرر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #4fa0e8; --dark: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--dark); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        .back-btn { display: inline-block; margin-bottom: 20px; color: var(--blue); text-decoration: none; font-weight: bold; }
        .lab-card { border: 1px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 30px; background: #fff; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; margin: 20px 0; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 8px; }
        .quiz-box { background: #f1f7fe; padding: 20px; border-radius: 8px; margin-top: 15px; }
        .question { margin-bottom: 15px; font-weight: bold; }
        .options label { display: block; margin: 5px 0; cursor: pointer; background: white; padding: 8px; border-radius: 5px; border: 1px solid #ddd; }
        .btn-score { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-family: 'Cairo'; }
        .score-result { margin-top: 10px; font-weight: bold; color: #28a745; display: none; }
    </style>
</head>
<body>

<div class="container">
    <a href="teaching.html" class="back-btn">← العودة لقائمة المقررات</a>
    <h1 id="displayTitle">اسم المقرر</h1>
    <p>رمز المقرر: <span id="displayCode"></span></p>
    <hr>
    
    <div id="labsContainer">
        </div>
</div>


</body>
</html>
